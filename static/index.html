<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPAM.FILTER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   rgba(255,255,255,0.03);
      --border:    rgba(255,255,255,0.08);
      --text:      #f0f0f0;
      --muted:     rgba(240,240,240,0.4);
      --spam:      #ff5050;
      --ham:       #50dcb4;
      --accent-bg-spam: rgba(255,80,80,0.08);
      --accent-bg-ham:  rgba(80,220,180,0.08);
    }

    body {
      background: var(--bg);
      font-family: 'Syne', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Grid background ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) rotate(0deg);   opacity: 0; }
      8%   { opacity: 0.7; }
      92%  { opacity: 0.7; }
      100% { transform: translateY(-120px) rotate(360deg); opacity: 0; }
    }
    @keyframes blink      { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes glitch {
      0%,88%,100%{transform:translate(0)}
      89%{transform:translate(-2px,1px)}
      91%{transform:translate(2px,-1px)}
      93%{transform:translate(-1px,2px)}
      95%{transform:translate(1px,-2px)}
    }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes revealUp {
      from{opacity:0;transform:translateY(28px)}
      to  {opacity:1;transform:translateY(0)}
    }
    @keyframes resultIn {
      from{opacity:0;transform:scale(.96) translateY(16px)}
      to  {opacity:1;transform:scale(1)   translateY(0)}
    }
    @keyframes pulseRing {
      0%  {transform:scale(1);  opacity:.5}
      100%{transform:scale(1.6);opacity:0}
    }
    @keyframes barFill {
      from{width:0}
    }
    @keyframes scanline {
      0%  {top:-60px}
      100%{top:100%}
    }

    /* ── Particles ── */
    .particles { position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0; }
    .particle  {
      position:absolute; border-radius:50%;
      animation: float linear infinite;
    }

    /* ── Layout ── */
    .wrapper {
      position:relative; z-index:1;
      min-height:100vh;
      padding: 48px 20px 100px;
    }
    .container { max-width:740px; margin:0 auto; }

    /* ── Header ── */
    .header {
      text-align:center;
      margin-bottom:44px;
      animation: revealUp .7s ease both;
    }
    .badge {
      display:inline-flex; align-items:center; gap:8px;
      background: var(--accent-bg-ham);
      border:1px solid rgba(80,220,180,.25);
      border-radius:100px;
      padding:6px 18px;
      font-family:'DM Mono',monospace;
      font-size:11px; color:var(--ham);
      letter-spacing:.15em; text-transform:uppercase;
      margin-bottom:22px;
    }
    .badge-dot {
      width:6px; height:6px; border-radius:50%;
      background:var(--ham);
      animation: blink 2s ease infinite;
    }
    h1 {
      font-size: clamp(44px,9vw,78px);
      font-weight:800; line-height:1;
      letter-spacing:-.03em;
      animation: glitch 9s ease infinite;
    }
    h1 span { color:var(--spam); }
    .subtitle {
      margin-top:14px;
      font-family:'DM Mono',monospace;
      font-size:12px; color:var(--muted);
      letter-spacing:.05em;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border:1px solid var(--border);
      border-radius:20px;
      overflow:hidden;
      backdrop-filter:blur(20px);
      animation: revealUp .7s .15s ease both;
    }
    .card-body { padding:30px 32px 28px; }

    /* ── Examples row ── */
    .ex-row { margin-bottom:26px; }
    .ex-label {
      font-family:'DM Mono',monospace;
      font-size:10px; color:rgba(240,240,240,.28);
      letter-spacing:.15em; text-transform:uppercase;
      margin-bottom:8px;
    }
    .ex-btns { display:flex; flex-wrap:wrap; gap:7px; }
    .ex-btn {
      display:flex; align-items:center; gap:5px;
      padding:6px 14px;
      border-radius:8px; border:1px solid;
      font-family:'DM Mono',monospace;
      font-size:11px; cursor:pointer;
      transition:all .2s; background:transparent;
    }
    .ex-btn.spam { border-color:rgba(255,80,80,.28); color:rgba(255,80,80,.65); }
    .ex-btn.spam:hover { border-color:var(--spam); color:var(--spam); background:rgba(255,80,80,.07); }
    .ex-btn.ham  { border-color:rgba(80,220,180,.28); color:rgba(80,220,180,.65); }
    .ex-btn.ham:hover  { border-color:var(--ham); color:var(--ham); background:rgba(80,220,180,.07); }

    /* ── Fields ── */
    .field { margin-bottom:18px; }
    .field-label {
      display:block;
      font-family:'DM Mono',monospace;
      font-size:10px; color:var(--muted);
      letter-spacing:.15em; text-transform:uppercase;
      margin-bottom:9px;
    }
    .input-wrap { position:relative; }
    .input-wrap::before {
      content:''; position:absolute;
      left:0; top:0; width:3px; height:100%;
      border-radius:2px 0 0 2px;
      background:linear-gradient(to bottom,var(--ham),transparent);
      opacity:0; transition:opacity .3s;
    }
    .input-wrap:focus-within::before { opacity:1; }
    input, textarea {
      width:100%;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.1);
      border-radius:12px;
      color:var(--text);
      font-family:'DM Mono',monospace;
      font-size:14px;
      padding:13px 17px;
      outline:none;
      transition:border-color .2s,background .2s;
      resize:none;
    }
    input:focus, textarea:focus {
      border-color:rgba(80,220,180,.4);
      background:rgba(80,220,180,.025);
    }
    input::placeholder, textarea::placeholder { color:rgba(240,240,240,.2); }

    /* ── Actions ── */
    .actions { display:flex; gap:10px; margin-top:6px; }
    .btn-analyze {
      flex:1; padding:15px 26px;
      border-radius:12px; border:none;
      background:linear-gradient(135deg,#50dcb4,#3dbfa0);
      color:#0a0a0f;
      font-family:'Syne',sans-serif;
      font-weight:700; font-size:15px;
      letter-spacing:.02em;
      cursor:pointer;
      transition:transform .2s,box-shadow .2s;
      position:relative; overflow:hidden;
    }
    .btn-analyze::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 60%);
    }
    .btn-analyze:hover:not(:disabled) {
      transform:translateY(-2px);
      box-shadow:0 8px 28px rgba(80,220,180,.3);
    }
    .btn-analyze:disabled { opacity:.45; cursor:not-allowed; }
    .btn-clear {
      padding:15px 20px;
      border-radius:12px; border:1px solid rgba(255,255,255,.1);
      background:transparent; color:var(--muted);
      font-family:'Syne',sans-serif; font-size:14px;
      cursor:pointer; transition:all .2s;
    }
    .btn-clear:hover { border-color:rgba(255,255,255,.2); color:rgba(240,240,240,.7); }

    /* ── Loading ── */
    .loading-strip {
      display:flex; align-items:center; gap:14px;
      padding:22px 32px;
      border-top:1px solid rgba(255,255,255,.06);
    }
    .spinner {
      width:26px; height:26px; flex-shrink:0;
      border:2px solid rgba(80,220,180,.2);
      border-top-color:var(--ham);
      border-radius:50%;
      animation: spin .75s linear infinite;
    }
    .loading-text {
      font-family:'DM Mono',monospace;
      font-size:13px; color:var(--muted);
    }

    /* ── Error ── */
    .error-strip {
      display:flex; align-items:center; gap:10px;
      padding:18px 32px;
      border-top:1px solid rgba(255,80,80,.15);
      font-family:'DM Mono',monospace;
      font-size:13px; color:rgba(255,80,80,.75);
    }

    /* ── Result ── */
    .result-panel {
      border-top:1px solid rgba(255,255,255,.06);
      position:relative; overflow:hidden;
      animation: resultIn .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    .result-scanline {
      position:absolute; left:0; width:100%; height:50px;
      background:linear-gradient(to bottom,transparent,rgba(255,255,255,.04),transparent);
      animation: scanline 1.2s ease .1s 1;
      top:-60px;
    }
    .result-inner { padding:26px 32px 30px; }

    .verdict-row {
      display:flex; align-items:center; gap:20px;
      margin-bottom:22px;
    }
    .verdict-icon {
      width:62px; height:62px; flex-shrink:0;
      border-radius:16px;
      display:flex; align-items:center; justify-content:center;
      font-size:26px;
      position:relative;
    }
    .verdict-icon.is-spam { background:rgba(255,80,80,.1); border:1px solid rgba(255,80,80,.3); }
    .verdict-icon.is-ham  { background:rgba(80,220,180,.1); border:1px solid rgba(80,220,180,.3); }
    .verdict-icon::before {
      content:''; position:absolute; inset:-5px;
      border-radius:20px; border:1px solid;
      opacity:.35; animation: pulseRing 2s ease infinite;
    }
    .verdict-icon.is-spam::before { border-color:var(--spam); }
    .verdict-icon.is-ham::before  { border-color:var(--ham); }

    .verdict-tag {
      font-family:'DM Mono',monospace;
      font-size:11px; letter-spacing:.2em; text-transform:uppercase;
      margin-bottom:5px;
    }
    .verdict-word {
      font-size:38px; font-weight:800;
      letter-spacing:-.03em; line-height:1;
    }
    .verdict-word.is-spam { color:var(--spam); }
    .verdict-word.is-ham  { color:var(--ham); }

    .conf-section { margin-bottom:20px; }
    .conf-header {
      display:flex; justify-content:space-between;
      font-family:'DM Mono',monospace;
      font-size:11px; color:var(--muted);
      letter-spacing:.1em; text-transform:uppercase;
      margin-bottom:9px;
    }
    .conf-val { color:var(--text); }
    .conf-track {
      height:6px; background:rgba(255,255,255,.07);
      border-radius:100px; overflow:hidden;
    }
    .conf-fill {
      height:100%; border-radius:100px;
      animation: barFill .9s cubic-bezier(.34,1.2,.64,1) both .1s;
    }
    .conf-fill.is-spam { background:linear-gradient(90deg,#ff5050,#ff8080); }
    .conf-fill.is-ham  { background:linear-gradient(90deg,#50dcb4,#80eccc); }

    .model-note {
      font-family:'DM Mono',monospace;
      font-size:11px; color:rgba(240,240,240,.25);
      margin-top:20px; font-style:italic;
    }

    /* ── History ── */
    .history {
      margin-top:28px;
      animation: revealUp .5s .3s ease both;
    }
    .history-label {
      font-family:'DM Mono',monospace;
      font-size:10px; color:rgba(240,240,240,.22);
      letter-spacing:.15em; text-transform:uppercase;
      margin-bottom:10px;
    }
    .history-list { display:flex; flex-direction:column; gap:5px; }
    .history-item {
      display:flex; align-items:center; gap:12px;
      padding:11px 15px;
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,255,255,.05);
      border-radius:10px;
      cursor:pointer; transition:all .2s;
    }
    .history-item:hover {
      background:rgba(255,255,255,.04);
      border-color:rgba(255,255,255,.1);
    }
    .h-badge {
      font-family:'DM Mono',monospace;
      font-size:10px; letter-spacing:.1em; text-transform:uppercase;
      padding:3px 9px; border-radius:5px; flex-shrink:0;
    }
    .h-badge.spam { background:rgba(255,80,80,.1); color:var(--spam); border:1px solid rgba(255,80,80,.2); }
    .h-badge.ham  { background:rgba(80,220,180,.1); color:var(--ham);  border:1px solid rgba(80,220,180,.2); }
    .h-subj {
      font-size:13px; color:rgba(240,240,240,.45);
      font-family:'DM Mono',monospace;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .h-conf { font-family:'DM Mono',monospace; font-size:11px; color:rgba(240,240,240,.22); margin-left:auto; flex-shrink:0; }

    /* ── Server-down notice ── */
    .server-notice {
      margin-bottom:20px;
      padding:14px 18px;
      background:rgba(255,200,80,.05);
      border:1px solid rgba(255,200,80,.2);
      border-radius:12px;
      font-family:'DM Mono',monospace;
      font-size:12px;
      color:rgba(255,200,80,.8);
      line-height:1.6;
      display:none;
    }
    .server-notice.visible { display:block; }
  </style>
</head>
<body>

<!-- Particles -->
<div class="particles" id="particles"></div>

<div class="wrapper">
  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="badge"><div class="badge-dot"></div>Naive Bayes · Scikit-learn</div>
      <h1>SPAM<span>.</span>FILTER</h1>
      <p class="subtitle">// subject + body ham/spam filter</p>
    </header>

    <!-- Server notice -->
    <div class="server-notice" id="serverNotice">
      ⚠ &nbsp;Cannot reach the Flask server at <code>http://localhost:5000</code>.
      Make sure <strong>app.py</strong> is running: <code>python app.py</code>
    </div>

    <!-- Main card -->
    <div class="card" id="card">
      <div class="card-body">

        <!-- Example buttons -->
        <div class="ex-row">
          <div class="ex-label">Try an example →</div>
          <div class="ex-btns">
            <button class="ex-btn spam" onclick="loadExample('You\'ve been selected!','Congratulations! You\'ve won a $1000 gift card. Click here to claim your prize before it expires in 24 hours!')">✕ Prize scam</button>
            <button class="ex-btn spam" onclick="loadExample('URGENT: Verify your account','Your account has been compromised. Click the link immediately to verify your identity and prevent closure.')">✕ Phishing</button>
            <button class="ex-btn ham"  onclick="loadExample('Team standup notes – Thursday','Hey everyone, here are the notes from today\'s standup. We discussed the Q2 roadmap and assigned tickets. See you tomorrow!')">✓ Work email</button>
            <button class="ex-btn ham"  onclick="loadExample('Your order has shipped','Hi! Your order #48291 has been shipped via FedEx. Tracking: 7489234892. Estimated delivery: April 7th.')">✓ Order update</button>
          </div>
        </div>

        <!-- Subject -->
        <div class="field">
          <label class="field-label" for="subject">Email Subject</label>
          <div class="input-wrap">
            <input id="subject" type="text" placeholder="Enter the email subject line…" />
          </div>
        </div>

        <!-- Body -->
        <div class="field">
          <label class="field-label" for="body">Email Body</label>
          <div class="input-wrap">
            <textarea id="body" rows="6" placeholder="Paste the full email body here…"></textarea>
          </div>
        </div>

        <!-- Buttons -->
        <div class="actions">
          <button class="btn-analyze" id="btnAnalyze" onclick="classify()">Analyze Email →</button>
          <button class="btn-clear" id="btnClear" onclick="clearAll()" style="display:none">Clear</button>
        </div>
      </div>

      <!-- Loading -->
      <div class="loading-strip" id="loading" style="display:none">
        <div class="spinner"></div>
        <span class="loading-text">Running classifier…</span>
      </div>

      <!-- Error -->
      <div class="error-strip" id="errorStrip" style="display:none"></div>

      <!-- Result -->
      <div class="result-panel" id="result" style="display:none">
        <div class="result-scanline"></div>
        <div class="result-inner">

          <div class="verdict-row">
            <div class="verdict-icon" id="verdictIcon"></div>
            <div>
              <div class="verdict-tag" id="verdictTag"></div>
              <div class="verdict-word" id="verdictWord"></div>
            </div>
          </div>

          <div class="conf-section">
            <div class="conf-header">
              <span>Confidence</span>
              <span class="conf-val" id="confVal"></span>
            </div>
            <div class="conf-track">
              <div class="conf-fill" id="confFill" style="width:0%"></div>
            </div>
          </div>

          <div class="model-note" id="modelNote"></div>
        </div>
      </div>
    </div>

    <!-- History -->
    <div class="history" id="historySection" style="display:none">
      <div class="history-label">Recent classifications</div>
      <div class="history-list" id="historyList"></div>
    </div>

  </div>
</div>

<script>
  /* ── Particles ─────────────────────────────── */
  (function(){
    const wrap = document.getElementById('particles');
    for(let i=0;i<22;i++){
      const p = document.createElement('div');
      p.className = 'particle';
      const isRed = Math.random()>.5;
      const size  = Math.random()*3+1;
      Object.assign(p.style,{
        width:size+'px', height:size+'px',
        background:`rgba(${isRed?'255,80,80':'80,220,180'},${(Math.random()*.35+.1).toFixed(2)})`,
        left:Math.random()*100+'%',
        animationDuration:(Math.random()*14+10)+'s',
        animationDelay:(Math.random()*-25)+'s',
      });
      wrap.appendChild(p);
    }
  })();

  /* ── State ─────────────────────────────────── */
  const API = 'http://localhost:5000';
  let history = [];

  /* ── Helpers ───────────────────────────────── */
  function $(id){ return document.getElementById(id); }

  function loadExample(subj, body){
    $('subject').value = subj;
    $('body').value    = body;
    hideResult();
    $('btnClear').style.display = '';
    $('serverNotice').classList.remove('visible');
  }

  function clearAll(){
    $('subject').value = '';
    $('body').value    = '';
    hideResult();
    $('btnClear').style.display    = 'none';
    $('errorStrip').style.display  = 'none';
    $('serverNotice').classList.remove('visible');
  }

  function hideResult(){
    $('result').style.display  = 'none';
    $('loading').style.display = 'none';
  }

  function showError(msg){
    const el = $('errorStrip');
    el.textContent = '⚠  ' + msg;
    el.style.display = 'flex';
  }

  /* ── Classify ──────────────────────────────── */
  async function classify(){
    const subject = $('subject').value.trim();
    const body    = $('body').value.trim();
    if(!subject && !body) return;

    $('errorStrip').style.display = 'none';
    $('result').style.display     = 'none';
    $('loading').style.display    = 'flex';
    $('btnAnalyze').disabled      = true;
    $('btnClear').style.display   = '';
    $('serverNotice').classList.remove('visible');

    try {
      const res = await fetch(`${API}/predict`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ subject, body })
      });

      if(!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();

      $('loading').style.display = 'none';
      showResult(data, subject);

      // Add to history
      history.unshift({ subject: subject||'(no subject)', classification: data.classification, confidence: data.confidence });
      if(history.length > 5) history.pop();
      renderHistory();

    } catch(err) {
      $('loading').style.display = 'none';
      if(err.message.includes('fetch') || err.message.includes('Failed')){
        $('serverNotice').classList.add('visible');
        showError('Could not reach Flask server — is app.py running?');
      } else {
        showError(err.message);
      }
    } finally {
      $('btnAnalyze').disabled = false;
    }
  }

  function showResult(data, subject){
    const isSpam = data.classification === 'spam';
    const panel  = $('result');

    $('verdictIcon').className  = `verdict-icon ${isSpam?'is-spam':'is-ham'}`;
    $('verdictIcon').textContent = isSpam ? '🚫' : '✅';
    $('verdictTag').textContent  = 'Classification';
    $('verdictTag').style.color  = isSpam ? 'var(--spam)' : 'var(--ham)';
    $('verdictWord').textContent = isSpam ? 'SPAM' : 'HAM';
    $('verdictWord').className   = `verdict-word ${isSpam?'is-spam':'is-ham'}`;
    $('confVal').textContent     = data.confidence + '%';

    const fill = $('confFill');
    fill.className = `conf-fill ${isSpam?'is-spam':'is-ham'}`;
    fill.style.width = '0%';
    // force reflow then animate
    void fill.offsetWidth;
    fill.style.width = data.confidence + '%';

    if(data.model_accuracy){
      $('modelNote').textContent = `// model test-set accuracy: ${data.model_accuracy}%`;
    }

    panel.style.display = 'block';
    panel.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }

  function renderHistory(){
    if(!history.length){ $('historySection').style.display='none'; return; }
    $('historySection').style.display = '';
    $('historyList').innerHTML = history.map(h=>`
      <div class="history-item" onclick="loadExample(${JSON.stringify(h.subject)},'')">
        <span class="h-badge ${h.classification}">${h.classification}</span>
        <span class="h-subj">${escHtml(h.subject)}</span>
        <span class="h-conf">${h.confidence}%</span>
      </div>
    `).join('');
  }

  function escHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enter key on subject field
  document.getElementById('subject').addEventListener('keydown', e=>{
    if(e.key==='Enter') classify();
  });
</script>
</body>
</html>
